name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Fully static musl binaries for Linux (no glibc runtime dependency).
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: remote-agentd-linux-x86_64-musl
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: remote-agentd-linux-aarch64-musl
            use_cross: true
          # Native targets (Windows / macOS) keep glibc-equivalent system libc.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: remote-agentd-windows-x86_64.exe
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: remote-agentd-macos-aarch64
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: remote-agentd-macos-x86_64
            use_cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install --locked cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify static linking (Linux musl)
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl')
        run: |
          file target/${{ matrix.target }}/release/remote-agentd
          readelf -d target/${{ matrix.target }}/release/remote-agentd | grep -E 'NEEDED|Shared' || true
          echo "::notice::musl binary should report 'statically linked' above"

      - name: Rename binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ -f remote-agentd.exe ]; then
            cp remote-agentd.exe ${{ matrix.artifact_name }}
          else
            cp remote-agentd ${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
